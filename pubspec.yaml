name: boo_mondai
description: "BooMondai — Gamified language learning with FSRS spaced repetition."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # ── State & UI ──────────────────────────────────────────
  provider: ^6.1.2
  flutter_hooks: ^0.20.5

  # ── Code generation ─────────────────────────────────────
  barrel_annotation: 1.0.0

  # ── Local persistence ────────────────────────────────────
  hive_ce: 2.19.3
  hive_ce_flutter: 2.3.4

  # ── Input & pickers ─────────────────────────────────────
  flutter_picker_plus: 1.5.6
  flutter_colorpicker: 1.1.0
  file_picker: 10.3.10

  # ── Notifications ────────────────────────────────────────
  flutter_local_notifications: ^21.0.0

  # ── Loading states ───────────────────────────────────────
  skeletonizer: 2.1.3

  # ── Utilities ────────────────────────────────────────────
  url_launcher: ^6.3.2
  flutter_screenutil: ^5.9.3

  # ── Backend ──────────────────────────────────────────────
  supabase_flutter: ^2.12.2

  # ── Navigation ───────────────────────────────────────────
  go_router: 17.0.1

  # ── Project-specific ─────────────────────────────────────
  fsrs: ^1.1.0                 # FSRS spaced repetition algorithm
  uuid: ^4.5.1                 # client-side UUID generation for offline-first

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.13
  barrel_generator: ^1.0.4
  hive_ce_generator: ^1.0.0
  flutter_launcher_icons: "^0.14.4"

flutter:
  uses-material-design: true
